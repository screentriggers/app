<!DOCTYPE html>
<html>
<head>
<title>Submission Form - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

textarea {
  font-family: Arial, sans-serif;
}

select[multiple] {
  height: 180px;
}

button {
  width: 100%;
  padding: 12px;
  background: #4a90e2;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #357ABD;
}

.secondary {
  background: #777;
}

.secondary:hover {
  background: #555;
}

h2 {
  font-size: 28px;
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 16px;
}

.note {
  font-size: 13px;
  color: #666;
  margin-top: -10px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Submit a Trigger Entry</h2>

<input id="title" placeholder="Title">

<input id="year" placeholder="Year">

<label>Trigger Category</label>
<select id="category" multiple>
  <option value="Gun violence">Gun violence</option>
  <option value="Sexual assault">Sexual assault</option>
  <option value="Suicide / self-harm">Suicide / self-harm</option>
