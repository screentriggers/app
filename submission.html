<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Submit Trigger</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#1f1f1f;
padding:20px;
font-size:24px;
text-align:center;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

input, select, textarea{

width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:none;

}

.button{

background:#6a5acd;
padding:12px;
text-align:center;
border-radius:8px;
cursor:pointer;
border:none;
color:white;
width:100%;

}

</style>

</head>

<body>

<header>Submit Trigger</header>

<div class="container">

<input id="title" placeholder="Movie Title">

<input id="year" placeholder="Year">

<select id="category">

<option>Gun violence</option>
<option>Sexual assault</option>
<option>Suicide / self-harm</option>
<option>Child abuse</option>
<option>Domestic violence</option>
<option>Animal harm</option>
<option>Substance abuse</option>
<option>Eating disorders</option>
<option>Medical trauma</option>
<option>Death / dying</option>
<option>Pregnancy / miscarriage</option>
<option>Kidnapping</option>
<option>Psychological abuse</option>
<option>Grief</option>
<option>Car accident</option>
<option>Illness</option>
<option>Mental health themes</option>
<option>Bullying</option>
<option>Infidelity</option>
<option>Religious trauma</option>
<option>Poverty</option>
<option>Other</option>

</select>

<select id="severity">

<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>

</select>

<textarea id="desc" placeholder="Description"></textarea>

<button class="button" onclick="submitForm()">
Submit
</button>

<br><br>

<a class="button" href="library.html">
Back to Library
</a>

</div>

<script>

function submitForm(){

let entry = {

title:
document.getElementById("title").value,

year:
document.getElementById("year").value,

category:
document.getElementById("category").value,

severity:
document.getElementById("severity").value,

desc:
document.getElementById("desc").value,

timestamp:
Date.now()

};

let data =
JSON.parse(localStorage.getItem("screenTriggers") || "[]");

data.push(entry);

localStorage.setItem(
"screenTriggers",
JSON.stringify(data)
);

alert("Submission saved!");

window.location.href="library.html";

}

</script>

</body>
</html>
