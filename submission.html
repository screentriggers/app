<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit – Screen Triggers</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:16px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4a90e2;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
}

a{
display:block;
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<h2>Submit Entry</h2>

<input id="title" placeholder="Title" required>

<input id="year" placeholder="Year" required>

<select id="category">

<option>Gun violence</option>
<option>Sexual assault</option>
<option>Suicide / self-harm</option>
<option>Child abuse</option>
<option>Domestic violence</option>
<option>Animal harm</option>
<option>Substance abuse</option>
<option>Eating disorders</option>
<option>Medical trauma</option>
<option>Death / dying</option>
<option>Pregnancy / miscarriage</option>
<option>Kidnapping</option>
<option>Psychological abuse</option>
<option>Grief (parent, child, animal loss)</option>
<option>Car accident</option>
<option>Illness (cancer, chronic illness)</option>
<option>Mental health themes</option>
<option>Bullying</option>
<option>Infidelity</option>
<option>Religious trauma</option>
<option>Poverty</option>
<option>Other</option>

</select>

<select id="severity">

<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>

</select>

<input id="timestamp" placeholder="Timestamp (00:00:00)">

<textarea id="desc" placeholder="Description"></textarea>

<button onclick="submitEntry()">Submit</button>

<a href="index.html">Back to Library</a>


<script>

function submitEntry(){

let entry = {

title:
document.getElementById("title").value,

year:
document.getElementById("year").value,

category:
document.getElementById("category").value,

severity:
document.getElementById("severity").value,

timestamp:
document.getElementById("timestamp").value,

desc:
document.getElementById("desc").value

};


let saved =
JSON.parse(localStorage.getItem("screenTriggers") || "[]");

saved.push(entry);

localStorage.setItem("screenTriggers", JSON.stringify(saved));

alert("Submission saved");

window.location.href="index.html";

}

</script>

</body>
</html>
