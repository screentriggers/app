<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Triggers</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
}

header{
background:#fff;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.container{
padding:16px;
max-width:600px;
margin:auto;
}

.card{
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.button{
display:block;
background:#4a90e2;
color:#fff;
text-align:center;
padding:12px;
border-radius:8px;
margin-bottom:10px;
text-decoration:none;
}

.search{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.small{
font-size:14px;
color:#555;
margin-top:4px;
}
</style>
</head>

<body>

<header>🎥 Screen Triggers</header>

<div class="container">

<a class="button" href="submission.html">Submission Form</a>

<input class="search" id="search" placeholder="Search title..." oninput="render()">

<div id="library"></div>

</div>


<script>


/* LOAD DATA */

function getLibrary(){

let builtIn = [

{
title:"The Lion King",
year:"1994",
category:"Grief (parent, child, animal loss)",
severity:"Severe",
timestamp:"00:30:45",
desc:"Death of parent"
}

];

let saved =
JSON.parse(localStorage.getItem("screenTriggers") || "[]");

return builtIn.concat(saved);

}



/* DISPLAY */

function render(){

let search =
document.getElementById("search").value.toLowerCase();

let library =
getLibrary();

let html="";

library.forEach(item=>{

if(item.title.toLowerCase().includes(search)){

html+=`
<div class="card">

<div><b>🎥 ${item.title} (${item.year})</b></div>

<div class="small">
Trigger Category: ${item.category}
</div>

<div class="small">
Severity: ${item.severity}
</div>

<div class="small">
Timestamp: ${item.timestamp}
</div>

<div class="small">
${item.desc}
</div>

</div>
`;

}

});

document.getElementById("library").innerHTML=html;

}


/* START */

render();

</script>

</body>
</html>
