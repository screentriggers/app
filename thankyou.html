<!DOCTYPE html>
<html>
<head>
<title>Thank You - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

/* Checkmark circle */
.checkmark-circle {
  width:80px;
  height:80px;
  margin:0 auto 10px auto;
}

.checkmark-circle svg {
  width:80px;
  height:80px;
}

/* Circle animation */
.circle {
  stroke:#4a90e2;
  stroke-width:3;
  fill:none;
  stroke-dasharray:251;
  stroke-dashoffset:251;
  animation: drawCircle 0.8s ease-out forwards;
}

/* Check animation */
.check {
  stroke:#4a90e2;
  stroke-width:4;
  fill:none;
  stroke-dasharray:60;
  stroke-dashoffset:60;
  animation: drawCheck 0.5s ease-out 0.8s forwards;
}

@keyframes drawCircle {
  to { stroke-dashoffset:0; }
}

@keyframes drawCheck {
  to { stroke-dashoffset:0; }
}

/* Heart pulse */
.heart {
  font-size:42px;
  margin-top:10px;
  animation: pulse 1.6s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity:0.85; }
  50% { transform: scale(1.15); opacity:1; }
  100% { transform: scale(1); opacity:0.85; }
}

h1 {
  margin-top:10px;
  margin-bottom:10px;
}

p {
  color:#555;
  margin-bottom:20px;
}

/* Buttons */
.button {
  display:block;
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  border-radius:999px;
  margin-top:12px;
  font-weight:bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  transition: all 0.15s ease;
}

.button:hover {
  opacity:0.95;
  transform: translateY(-1px);
}

.kofi {
  background:#29abe0;
}

.small {
  margin-top:20px;
  font-size:14px;
  color:#777;
}

</style>
</head>
<body>

<div class="container">

<div class="checkmark-circle">
<svg viewBox="0 0 100 100">
  <circle class="circle" cx="50" cy="50" r="40"/>
  <polyline class="check" points="30,52 45,65 70,40"/>
</svg>
</div>

<div class="heart">💙</div>

<h1>Submission received</h1>

<p>
Thank you for helping make Screen Triggers safer and more accessible.
</p>

<a class="button" href="index.html">
Home
</a>

<a class="button kofi" href="https://ko-fi.com/YOURNAME" target="_blank">
☕ Support this project
</a>

<div class="small">
Every submission makes a difference.
</div>

</div>

</body>
</html>
