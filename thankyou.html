<!DOCTYPE html>
<html>
<head>
<title>Thank You - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

/* Illustration animation */
.illustration {
  width:180px;
  margin:auto;
  margin-bottom:15px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-8px);}
  100% { transform: translateY(0px);}
}

h1 {
  margin-top:5px;
  margin-bottom:10px;
}

p {
  color:#555;
  margin-bottom:20px;
}

/* Buttons */
.button {
  display:block;
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  border-radius:6px;
  margin-top:12px;
  font-weight:bold;
}

.button:hover {
  opacity:0.9;
}

.kofi {
  background:#29abe0;
}

.small {
  margin-top:20px;
  font-size:14px;
  color:#777;
}

</style>
</head>
<body>

<div class="container">

<img 
class="illustration"
src="thankyou-animation.gif"
alt="Thank you illustration">

<h1>Thank you!</h1>

<p>
Your contribution helps make Screen Triggers safer and more accessible for everyone.
</p>

<a class="button" href="index.html">
Return to Library
</a>

<a class="button kofi" href="https://ko-fi.com/YOURNAME" target="_blank">
☕ Support this project
</a>

<div class="small">
Every submission makes a difference. 💙
</div>

</div>

</body>
</html>
