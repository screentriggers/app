<!DOCTYPE html>
<html>
<head>
<title>Thank You - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

/* Animated heart */
.heart {
  font-size:60px;
  animation: pulse 1.6s infinite;
  display:inline-block;
  margin-bottom:10px;
}

@keyframes pulse {
  0% { transform: scale(1); opacity:0.85; }
  50% { transform: scale(1.15); opacity:1; }
  100% { transform: scale(1); opacity:0.85; }
}

.sparkle {
  font-size:24px;
  animation: float 2.5s infinite ease-in-out;
  display:block;
  margin-bottom:10px;
}

@keyframes float {
  0% { transform: translateY(0px); opacity:0.7;}
  50% { transform: translateY(-6px); opacity:1;}
  100% { transform: translateY(0px); opacity:0.7;}
}

h1 {
  margin-top:5px;
  margin-bottom:10px;
}

p {
  color:#555;
  margin-bottom:20px;
}

/* Full-width buttons like image 1 */
.button {
  display:block;
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  border-radius:6px;
  margin-top:12px;
  font-weight:bold;
}

.button:hover {
  opacity:0.9;
}

.kofi {
  background:#29abe0;
}

.small {
  margin-top:20px;
  font-size:14px;
  color:#777;
}

</style>
</head>
<body>

<div class="container">

<div class="heart">💙</div>
<div class="sparkle">✨</div>

<h1>Thank you!</h1>

<p>
Your contribution helps make Screen Triggers safer for everyone.
</p>

<a class="button" href="index.html">
Return to Library
</a>

<a class="button kofi" href="https://ko-fi.com/YOURNAME" target="_blank">
☕ Support this project
</a>

<div class="small">
Every submission makes a difference.
</div>

</div>

</body>
</html>
