<!DOCTYPE html>
<html>
<head>
<title>Thank You - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

/* Illustration wrapper */
.illustration-wrapper {
  position:relative;
  width:220px;
  margin:auto;
  margin-bottom:15px;
}

/* Floating illustration */
.illustration {
  width:100%;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

/* Ripple glow behind heart */
.ripple {
  position:absolute;
  right:26px;
  bottom:16px;
  width:40px;
  height:40px;
  border-radius:50%;
  background: rgba(74,144,226,0.25);
  animation: rippleAnim 2s infinite;
  z-index:0;
}

@keyframes rippleAnim {

  0% {
    transform: scale(0.5);
    opacity:0.6;
  }

  70% {
    transform: scale(2.2);
    opacity:0;
  }

  100% {
    opacity:0;
  }

}

/* Heart */
.heart {
  position:absolute;
  right:30px;
  bottom:20px;
  font-size:28px;
  animation: heartPulse 1.4s infinite;
  z-index:2;
}

@keyframes heartPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.35); }
  100% { transform: scale(1); }
}

/* Sparkles */
.sparkle {
  position:absolute;
  font-size:14px;
  opacity:0;
  animation: sparkleAnim 2.5s infinite;
}

.sparkle.s1 {
  right:15px;
  bottom:55px;
  animation-delay:0s;
}

.sparkle.s2 {
  right:60px;
  bottom:60px;
  animation-delay:0.8s;
}

.sparkle.s3 {
  right:45px;
  bottom:5px;
  animation-delay:1.6s;
}

@keyframes sparkleAnim {

  0% {
    transform: translateY(0px) scale(0.5);
    opacity:0;
  }

  50% {
    transform: translateY(-8px) scale(1);
    opacity:1;
  }

  100% {
    transform: translateY(-16px) scale(0.5);
    opacity:0;
  }

}

h1 {
  margin-top:5px;
  margin-bottom:10px;
}

p {
  color:#555;
  margin-bottom:20px;
}

.button {
  display:block;
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  border-radius:6px;
  margin-top:12px;
  font-weight:bold;
}

.button:hover {
  opacity:0.9;
}

.kofi {
  background:#29abe0;
}

.small {
  margin-top:20px;
  font-size:14px;
  color:#777;
}

</style>
</head>
<body>

<div class="container">

<div class="illustration-wrapper">

<img class="illustration" src="thankyou.png">

<div class="ripple"></div>

<div class="heart">💙</div>

<div class="sparkle s1">✨</div>
<div class="sparkle s2">✨</div>
<div class="sparkle s3">✨</div>

</div>

<h1>Thank you!</h1>

<p>
Your contribution helps make Screen Triggers safer and more accessible for everyone.
</p>

<a class="button" href="index.html">
Return to Library
</a>

<a class="button kofi" href="https://ko-fi.com/YOURNAME" target="_blank">
☕ Support this project
</a>

<div class="small">
Every submission makes a difference.
</div>

</div>

</body>
</html>
