<!DOCTYPE html>
<html>
<head>
<title>Thank You - Screen Triggers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

/* Animated illustration */
.illustration {
  width:220px;
  margin:auto;
  margin-bottom:15px;

  animation:
    float 3s ease-in-out infinite,
    glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

@keyframes glow {
  0% { filter: drop-shadow(0 0 0px rgba(74,144,226,0.0)); }
  50% { filter: drop-shadow(0 0 12px rgba(74,144,226,0.35)); }
  100% { filter: drop-shadow(0 0 0px rgba(74,144,226,0.0)); }
}

h1 {
  margin-top:5px;
  margin-bottom:10px;
}

p {
  color:#555;
  margin-bottom:20px;
}

.button {
  display:block;
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:white;
  text-decoration:none;
  border-radius:6px;
  margin-top:12px;
  font-weight:bold;
}

.kofi {
  background:#29abe0;
}

.small {
  margin-top:20px;
  font-size:14px;
  color:#777;
}

</style>
</head>
<body>

<div class="container">

<img class="illustration" src="thankyou.png">

<h1>Thank you!</h1>

<p>
Your contribution helps make Screen Triggers safer and more accessible for everyone.
</p>

<a class="button" href="index.html">
Return to Library
</a>

<a class="button kofi" href="https://ko-fi.com/YOURNAME" target="_blank">
☕ Support this project
</a>

<div class="small">
Every submission makes a difference. 💙
</div>

</div>

</body>
</html>
